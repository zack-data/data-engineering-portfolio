name: Update CV Duration

on:
  schedule:
    - cron: "0 0 1 * *" # 1st of every month at midnight UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-duration:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update Fyxer duration in CV.md
        run: python scripts/update_cv_duration.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CV.md
          git diff --cached --quiet || git commit -m "chore: update Fyxer duration in CV"
          git push
